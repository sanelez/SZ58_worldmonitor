syntax = "proto3";

package worldmonitor.forecast.v1;

import "sebuf/http/annotations.proto";
import "worldmonitor/forecast/v1/get_forecasts.proto";
import "worldmonitor/forecast/v1/get_simulation_package.proto";
import "worldmonitor/forecast/v1/get_simulation_outcome.proto";
import "worldmonitor/forecast/v1/trigger_simulation.proto";

service ForecastService {
  option (sebuf.http.service_config) = {base_path: "/api/forecast/v1"};

  // GetForecasts returns the latest generated probabilistic forecasts, with degraded/stale flags that distinguish a backend outage from a healthy empty set.
  rpc GetForecasts(GetForecastsRequest) returns (GetForecastsResponse) {
    option (sebuf.http.config) = {path: "/get-forecasts", method: HTTP_METHOD_GET};
  }

  // GetSimulationPackage returns the latest forecast simulation package; the response note is populated when a supplied runId does not match the returned package.
  rpc GetSimulationPackage(GetSimulationPackageRequest) returns (GetSimulationPackageResponse) {
    option (sebuf.http.config) = {path: "/get-simulation-package", method: HTTP_METHOD_GET};
  }

  // GetSimulationOutcome returns the stored outcome of a forecast simulation run; `found` is false when no outcome matches the requested runId.
  rpc GetSimulationOutcome(GetSimulationOutcomeRequest) returns (GetSimulationOutcomeResponse) {
    option (sebuf.http.config) = {path: "/get-simulation-outcome", method: HTTP_METHOD_GET};
  }

  // TriggerSimulation enqueues a simulation task for the current
  // SIMULATION_PACKAGE_LATEST_KEY package pointer. PRO-gated. The runId
  // is server-derived; callers cannot supply one. The Railway worker
  // (scripts/process-simulation-tasks.mjs) polls the queue and writes
  // outcomes; callers poll GetSimulationOutcome with the returned runId
  // to retrieve the result. Mirrors run-scenario.ts pattern. See #3734.
  rpc TriggerSimulation(TriggerSimulationRequest) returns (TriggerSimulationResponse) {
    option (sebuf.http.config) = {path: "/trigger-simulation", method: HTTP_METHOD_POST};
  }
}
